{% extends 'Volunteer/Header.html' %}
{% block content %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donation</title>

    <style>
        body {
            font-family: "Inter", "Segoe UI", Arial, sans-serif;
            background-color: #f3eadaa1;
            padding: 30px;
            color: #374151;
        }

        table {
            width: 55%;
            margin: auto;
            border-collapse: collapse;
            background-color: #ffffff;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        table, td {
            border: 1px solid #cfd4dc;
        }

        td {
            padding: 14px;
            font-size: 14px;
        }

        tr:first-child td {
            font-weight: 600;
        }

        input[type="text"] {
            width: 95%;
            padding: 8px 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
        }

        input[type="radio"] {
            margin-right: 6px;
            margin-left: 10px;
        }

        input[type="submit"] {
            background-color: #111827;
            color: #ffffff;
            border: none;
            padding: 10px 28px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 22px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #1f2937;
        }
    </style>
</head>

<body>
    <form action="" method="post">
        {% csrf_token %}

        <table align="center">
            <tr>
                <td>Type</td>
                <td>
                    <input type="radio" name="txt_type" value="Money"> Money
                    <input type="radio" name="txt_type" value="Material"> Material
                </td>
            </tr>

            <tr>
                <td>Remark</td>
                <td>
                    <input type="text" name="txt_remark" id="txt_remark">
                </td>
            </tr>

            <tr>
                <td>Amount / Quantity</td>
                <td>
                    <input type="text" name="txt_amount" id="txt_amount" required>
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Submit">
                </td>
            </tr>
        </table>
    </form>
</body>

{% if msg %}
<script>
    alert("{{msg}}")
    window.location = "{% url 'Volunteer:ViewDonationRequest' %}";
</script>
{% endif %}

</html>

{% endblock %}
