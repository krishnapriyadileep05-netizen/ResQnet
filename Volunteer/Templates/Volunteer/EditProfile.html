{% extends 'Volunteer/Header.html' %}
{% block content %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    <style>
        body {
            font-family: "Inter", "Segoe UI", Arial, sans-serif;
            background-color: #f3eadaa1; /* soft background */
            padding: 30px;
            color: #374151;
        }

        h2 {
            text-align: center;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 20px;
        }

        table {
            width: 50%;
            margin: auto;
            border-collapse: collapse;
            background-color: #ffffff;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        th, td {
            border: 1px solid #cfd4dc;
            padding: 12px;
            font-size: 14px;
        }

        input[type="text"], input[type="email"] {
            width: 95%;
            padding: 8px;
            border: 1px solid #cfd4dc;
            border-radius: 6px;
            font-size: 14px;
        }

        input[type="submit"] {
            background-color: #e39c7d;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        input[type="submit"]:hover {
            background-color: #d17b58;
        }

        tr:hover td {
            background-color: #f9fafb;
            transition: background 0.2s ease;
        }

    </style>
</head>
<body>
    <h2>Edit Profile</h2>
    <form action="" method="post">
        {% csrf_token %}
        <table>
            <tr>
                <td>Name</td>
                <td><input type="text" required name="txt_name" id="txt_name" value="{{vdata.volunteer_name}}" 
                title="Name Allows Only Alphabets,Spaces and First Letter Must Be Capital Letter" pattern="^[A-Z]+[a-zA-Z ]*$"></td>
            </tr>
            <tr>
                <td>Email</td>
                <td><input type="email" required name="txt_email" id="txt_email" value="{{vdata.volunteer_email}}"></td>
            </tr>
            <tr>
                <td>Contact</td>
                <td><input type="text" required name="txt_contact" id="txt_contact" value="{{vdata.volunteer_contact}}" 
                pattern="[7-9]{1}[0-9]{9}" title="Phone number with 7-9 and remaining 9 digits 0-9"></td>
            </tr>
            <tr>
                <td>Address</td>
                <td><input type="text" required name="txt_address" id="txt_address" value="{{vdata.volunteer_address}}"></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><input type="submit" value="Update"></td>
            </tr>
        </table>
    </form>

{% if msg %}
<script>
    alert("{{msg}}")
    window.location="{% url 'Volunteer:MyProfile' %}";
</script>
{% endif %}
</body>
</html>

{% endblock %}
