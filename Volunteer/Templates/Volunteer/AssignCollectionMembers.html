{% extends 'Volunteer/Header.html' %}
{% block content %}

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign Members</title>

    <style>
        body {
            font-family: "Inter", "Segoe UI", Arial, sans-serif;
            background-color: #f3eadaa1;
            padding: 30px;
            color: #374151;
        }

        h2 {
            text-align: center;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 20px;
        }

        table {
            width: 80%;
            margin: auto;
            border-collapse: collapse;
            background-color: #ffffff;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        th, td {
            border: 1px solid #cfd4dc;
            padding: 12px;
            text-align: center;
            font-size: 14px;
        }

        th {
            background-color: #e39c7d;
            font-weight: 600;
        }

        tr:hover td {
            background-color: #f9fafb;
        }

        input[type="submit"] {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        input[type="submit"]:hover {
            background-color: #1e40af;
        }

        a {
            text-decoration: none;
            color: #2563eb;
            font-weight: 500;
        }

        a:hover {
            text-decoration: underline;
        }

        center {
            margin-top: 15px;
        }
    </style>
</head>
<body>

<h2>Assign Team Members (Collection)</h2>

<form method="post">
    {% csrf_token %}

    <table>
        <tr>
            <th>Select</th>
            <th>Name</th>
            <th>Contact</th>
        </tr>

        {% for i in teamdata %}
        <tr>
            <td>
                <input type="checkbox" name="team_id" value="{{ i.id }}"
                {% for a in assigned %}
                    {% if a.team_id.id == i.id %} checked disabled {% endif %}
                {% endfor %}
                >
            </td>
            <td>{{ i.team_name }}</td>
            <td>{{ i.team_contact }}</td>
        </tr>
        {% endfor %}
    </table>

    <center>
        <input type="submit" value="Assign Selected Members">
        <br><br>
        <a href="{% url 'Volunteer:Team' %}">➕ Add New Member</a>
    </center>
</form>

</body>
</html>

{% endblock %}
