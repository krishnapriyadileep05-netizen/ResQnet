{% extends 'Volunteer/Header.html' %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViewItem</title>

    <style>
        body {
            font-family: "Inter", "Segoe UI", Arial, sans-serif;
            background-color: #f3eadaa1;
            padding: 30px;
            color: #374151;
        }

        table {
            width: 80%;
            margin: auto;
            border-collapse: collapse;
            background-color: #ffffff;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        table, td {
            border: 1px solid #cfd4dc; /* row + column lines */
        }

        td {
            padding: 12px;
            font-size: 14px;
            text-align: center;
        }

        tr:first-child td {
            background-color: #e39c7d;
            font-weight: 600;
        }

        tr:hover td {
            background-color: #f9fafb;
        }

        a {
            text-decoration: none;
            color: #2563eb;
            font-weight: 500;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <form action="" method="post">
        {% csrf_token %}

        <table align="center">
            <tr>
                <td>SI.NO</td>
                <td>Name</td>
                <td>Count</td>
                <td>Action</td>
            </tr>

            {% for i in itemdata %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ i.donationitems_name }}</td>
                <td>{{ i.donationitems_count }}</td>
                <td>
                    <a href="{% url 'Volunteer:Donate' i.id %}">Donate</a>
                </td>
            </tr>
            {% endfor %}
        </table>
    </form>
</body>
</html>

{% endblock %}
