<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Inter", "Segoe UI", Arial, sans-serif;
          background:
linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                url("https://images.unsplash.com/photo-1521791136064-7986c2920216?auto=format&fit=crop&w=1600&q=80");
background-size: cover;
background-position: center;
background-repeat: no-repeat;

            display: flex;
            align-items: center;
            justify-content: center;
        }

        form {
background: rgba(255, 255, 255, 0.15);            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);

            padding: 30px 34px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 360px;

            box-shadow:
                0 10px 30px rgba(0, 0, 0, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);

            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        form:hover {
            transform: translateY(-3px);
            box-shadow:
                0 18px 45px rgba(0, 0, 0, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
        }

        h2 {
            text-align: center;
            margin-bottom: 24px;
            font-size: 22px;
            font-weight: 600;
            color: #fefeff;
        }

        table {
            width: 100%;
        }

        td {
            padding: 10px;
            font-size: 14px;
            color: #375142;
        }

        td:first-child {
            width: 35%;
            color: #dadcdf;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 9px 10px;
            font-size: 14px;
            border: 1px solid #e7edf7;
            border-radius: 8px;
            outline: none;
            background-color: rgba(255, 255, 255, 0.9);
        }

        input:focus {
            border-color: #f9f9ff;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.25);
        }

        input[type="submit"] {
            margin-top: 14px;
            background: linear-gradient(135deg, #151e32, #1f2937);
            color: #ffffff;
            border: none;
            padding: 10px 36px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 24px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.3s ease;
        }

        input[type="submit"]:hover {
            transform: scale(1.05);
            box-shadow: 0 0 18px rgba(99, 102, 241, 0.6);
        }
    </style>
</head>

<body>

    <form action="" method="post">
        {% csrf_token %}

        <h2>Login</h2>

        <table align="center">
            <tr>
                <td>Email</td>
                <td>
                    <input type="text" name="txt_email" id="txt_email">
                </td>
            </tr>
            <tr>
                <td>Password</td>
                <td>
                    <input type="password" name="txt_password" id="txt_password">
                </td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Login">
                </td>
            </tr>
        </table>
    </form>

</body>
</html>
