{% extends 'User/Header.html' %}
{% block content %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <style>
        body {
            font-family: "Inter", "Segoe UI", Arial, sans-serif;
            background-color: #f3eadaa1;
            padding: 30px;
            color: #374151;
        }

        h2 {
            text-align: center;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 20px;
        }

        table {
            width: 40%;
            margin: auto;
            border-collapse: collapse;
            background-color: #ffffff;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        th, td {
            border: 1px solid #cfd4dc;
            padding: 12px;
            font-size: 14px;
        }

        input[type="password"] {
            width: 95%;
            padding: 8px;
            border: 1px solid #cfd4dc;
            border-radius: 6px;
            font-size: 14px;
        }

        input[type="submit"] {
            background-color: #e39c7d;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        input[type="submit"]:hover {
            background-color: #d17b58;
        }

        tr:hover td {
            background-color: #f9fafb;
            transition: background 0.2s ease;
        }

    </style>
</head>
<body>

<h2>Change Password</h2>

<form action="" method="post">
    {% csrf_token %}
    <table>
        <tr>
            <td>Old Password</td>
            <td><input type="password" required name="txt_old" id="txt_old"></td>
        </tr>
        <tr>
            <td>New Password</td>
            <td><input type="password" required name="txt_new" id="txt_new"></td>
        </tr>
        <tr>
            <td>Re-Type Password</td>
            <td><input type="password" required name="txt_retype" id="txt_retype"></td>
        </tr>
        <tr>
            <td colspan="2" align="center">
                <input type="submit" value="Update">
            </td>
        </tr>
    </table>
</form>

{% if msg %}
<script>
    alert("{{msg}}");
    window.location="{% url 'User:MyProfile' %}";
</script>
{% elif msg1 %}
<script>
    alert("{{msg1}}");
</script>
{% endif %}

</body>
</html>

{% endblock %}
