{% extends 'User/Header.html' %}
{% block content %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request</title>

    <style>
        body {
            background-color: #b4a68ea1;
            font-family: "Inter", "Segoe UI", Arial, sans-serif;
            color: #6f1313bd;
        }

        h2 {
            font-size: 22px;
            font-weight: 500;
            margin-bottom: 24px;
            color: #111827;
        }

        table {
            width: 460px;
            background-color: #f0efef;
            border-collapse: separate;
            border-spacing: 0;
            border-radius: 12px;
            border: 1px solid #c3c3c4;
            padding: 6px;
        }

        td {
            padding: 14px 16px;
            font-size: 14px;
            vertical-align: middle;
        }

        td:first-child {
            color: #030c1e;
            width: 40%;
        }

        tr:not(:last-child) td {
            border-bottom: 1px solid #d2d2d2;
        }

        input[type="text"],
        input[type="date"],
        textarea,
        select {
            width: 100%;
            padding: 9px 10px;
            font-size: 14px;
            border: 1px solid #d6d8dc;
            border-radius: 8px;
            background-color: #ffffff;
            color: #111827;
            outline: none;
        }

        textarea {
            height: 78px;
            resize: none;
        }

        input::placeholder,
        textarea::placeholder {
            color: #9ca3af;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: #c7d2fe;
            background-color: #ffffff;
        }

        input[type="radio"] {
            accent-color: #4f46e5;
            margin-right: 6px;
            margin-left: 14px;
        }

        input[type="submit"] {
            background-color: #011031f9;
            color: #ffffff;
            border: none;
            padding: 10px 32px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 24px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #02285e8e;
        }
    </style>

</head>

<body>

    <form action="" method="post">
        {% csrf_token %}

        <h1 align="center">Request</h1>

        <table border="1" align="center">
            <tr>
                <td>Title</td>
                <td><input type="text" name="txt_title"></td>
            </tr>
            <tr>
                <td>Content</td>
                <td><textarea name="txt_content"></textarea></td>
            </tr>
            <tr>
                <td>Request Type</td>
                <td>
                    <input type="radio" name="req_type" value="0" checked> Donation
                    <input type="radio" name="req_type" value="1"> Emergency / Volunteer Help
                </td>
            </tr>
            <tr>
                <td>District</td>
                <td>
                    <select name="sel_district" id="sel_district">
                        <option value="">--select--</option>
                        {% for i in district %}
                        <option value="{{i.id}}">{{i.district_name}}</option>
                        {% endfor %}
                    </select>
                </td>
            </tr>
            <tr>
                <td>Place</td>
                <td>
                    <select name="sel_place" id="sel_place">
                        <option value="">--select--</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>To Date</td>
                <td><input type="date" name="txt_date"></td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Submit">
                </td>
            </tr>
        </table>
    </form>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script>
        $("#sel_district").change(function () {
            var did = $(this).val();
            $.ajax({
                url: "{% url 'Guest:ajaxplace' %}",
                data: { did: did },
                success: function (data) {
                    $("#sel_place").html(data);
                }
            });
        });
    </script>

</body>

</html>

{% endblock %}
