<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Members</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        h2 {
            margin-top: 30px;
            color: rgb(15, 59, 117);
        }

        table {
            border-collapse: collapse;
            width: 85%;
            margin: 30px auto;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: rgb(15, 59, 117);
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #e6f0ff;
        }

        img {
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid #ddd;
        }

        td {
            border-bottom: 1px solid #ddd;
        }

    </style>
</head>

<body>
<form action="" method="post" enctype="multipart/form-data">
    <h2 style="text-align: center;">Volunteer List</h2>

    <table border="1" align="center">
        <tr>
            <th>SI.NO</th>
            <th>Name</th>
            <th>Photo</th>
            <th>Address</th>
            <th>Contact</th>
        </tr>

        {% for i in memberdata %}
        <tr>
            <td>{{ forloop.counter }}</td>
            <td>{{ i.team_id.team_name }}</td>
            <td>
                <img src="{{ i.team_id.volunteer_id.volunteer_photo.url }}" 
                     width="80" height="80" alt="">
            </td>
            <td>{{ i.team_id.team_address }}</td>
            <td>{{ i.team_id.team_contact }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5" align="center">No Members Assigned</td>
        </tr>
        {% endfor %}
    </table>
</form>

</body>
</html>
