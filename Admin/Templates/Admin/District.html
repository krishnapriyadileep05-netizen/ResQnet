{% extends 'Admin/Header.html' %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>District</title>

    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: #f6f7fb;
            padding: 30px;
            color: #333;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }

        table {
            width: 500px;
            margin: 20px auto;
            border-collapse: collapse;
            background-color: #ffffff;
            border-radius: 10px;
            overflow: hidden;
        }

        table + table {
            width: 70%;
        }

        th, td {
            border: 1px solid #e0e0e0;
            padding: 10px;
            font-size: 14px;
            text-align: center;
        }

        th {
            background-color: #0b346d;
            color: white;
            font-weight: 600;
        }

        tr:hover td {
            background-color: #f2f5fa;
        }

        input[type="text"] {
            width: 90%;
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 5px;
        }

        input[type="submit"] {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            background-color: #093572;
            color: white;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #082653;
        }

        a {
            text-decoration: none;
            color: #6c8ebf;
            font-weight: 500;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<form action="" method="post">
    {% csrf_token %}

    <h2>Districts</h2>

    <table>
        <tr>
            <td>District</td>
            <td>
                <input type="text" required name="txt_name" id="txt_name"
                       value="{{ editdata.district_name }}">
            </td>
        </tr>
        <tr>
            <td colspan="2">
                <input type="submit" value="Submit">
            </td>
        </tr>
    </table>
</form>

<table>
    <tr>
        <th>SI.NO</th>
        <th>District</th>
        <th>Action</th>
    </tr>

    {% for i in district %}
    <tr>
        <td>{{ forloop.counter }}</td>
        <td>{{ i.district_name }}</td>
        <td>
            <a href="{% url 'Admin:deldistrict' i.id %}">Delete</a> /
            <a href="{% url 'Admin:editdistrict' i.id %}">Edit</a>
        </td>
    </tr>
    {% endfor %}
</table>

{% if msg %}
<script>
    alert("{{msg}}")
    window.location="{% url 'Admin:District' %}";
</script>
{% endif %}

</body>
</html>
{% endblock %}
