{% extends 'Admin/Header.html' %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place</title>

    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: #f6f7fb;
            padding: 30px;
            color: #333;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }

        table {
            width: 600px;
            margin: 20px auto;
            border-collapse: collapse;
            background-color: #ffffff;
            border-radius: 10px;
            overflow: hidden;
        }

        table + table {
            width: 85%;
        }

        th, td {
            border: 1px solid #e0e0e0;
            padding: 10px;
            font-size: 14px;
            text-align: center;
        }

        th {
            background-color: #0b2e60;
            color: white;
            font-weight: 600;
        }

        tr:hover td {
            background-color: #f2f5fa;
        }

        input[type="text"],
        select {
            width: 90%;
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 5px;
        }

        input[type="submit"] {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            background-color: #082753;
            color: white;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #042250;
        }

        a {
            text-decoration: none;
            color: #6c8ebf;
            font-weight: 500;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<form action="" method="post">
    {% csrf_token %}

    <h2>Places</h2>

    <table>
        <tr>
            <td>District</td>
            <td>
                <select name="sel_district" id="sel_district">
                    <option value="">-- Select --</option>
                    {% for i in district %}
                    <option value="{{i.id}}"
                        {% if i.id == editdata.district.id %}
                        selected
                        {% endif %}>
                        {{i.district_name}}
                    </option>
                    {% endfor %}
                </select>
            </td>
        </tr>

        <tr>
            <td>Place</td>
            <td>
                <input type="text" name="txt_name" id="txt_name"
                       value="{{ editdata.place_name }}">
            </td>
        </tr>

        <tr>
            <td colspan="2">
                <input type="submit" value="Submit">
            </td>
        </tr>
    </table>
</form>

<table>
    <tr>
        <th>SI.NO</th>
        <th>District</th>
        <th>Place</th>
        <th>Action</th>
    </tr>

    {% for i in place %}
    <tr>
        <td>{{forloop.counter}}</td>
        <td>{{i.district.district_name}}</td>
        <td>{{i.place_name}}</td>
        <td>
            <a href="{% url 'Admin:delplace' i.id %}">Delete</a> /
            <a href="{% url 'Admin:editplace' i.id %}">Edit</a>
        </td>
    </tr>
    {% endfor %}
</table>

{% if msg %}
<script>
    alert("{{msg}}")
    window.location="{% url 'Admin:Place' %}";
</script>
{% endif %}

</body>
</html>
{% endblock %}
