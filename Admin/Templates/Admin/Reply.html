{% extends 'Admin/Header.html' %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reply</title>

    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: #f6f7fb;
            padding: 40px;
            color: #333;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }

        table {
            width: 400px;
            margin: 20px auto;
            border-collapse: collapse;
            background-color: #ffffff;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            border: 1px solid #e0e0e0;
            padding: 12px;
            font-size: 14px;
            text-align: center;
        }

        input[type="text"] {
            width: 90%;
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 5px;
        }

        input[type="submit"] {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            background-color: #052d64;
            color: white;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #0f356f;
        }
    </style>
</head>

<body>
<form action="" method="post">
    {% csrf_token %}

    <h2>Reply</h2>

    <table>
        <tr>
            <td>Reply</td>
            <td>
                <input type="text" name="txt_reply" id="txt_reply">
            </td>
        </tr>
        <tr>
            <td colspan="2">
                <input type="submit" value="Submit">
            </td>
        </tr>
    </table>
</form>

{% if msg %}
<script>
    alert("{{msg}}")
    window.location="{% url 'Admin:ViewComplaint' %}";
</script>
{% endif %}

</body>
</html>
{% endblock %}
